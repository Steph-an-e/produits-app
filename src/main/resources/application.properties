spring.application.name=Cours

# Le texte apres ':' est la valeur par defaut (votre PC).
# Elle sera remplacee par la variable d'environnement si elle existe.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/spring_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Port : Render imposera la variable PORT. Sur votre PC -> 8080.
server.port=${PORT:8080}

jwt.secret=MaCleSecreteTresLongueEtComplexe2024!@#$%
jwt.expiration=864000000
jwt.prefix=Bearer